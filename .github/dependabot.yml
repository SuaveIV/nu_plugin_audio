version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"

    groups:
      nushell:
        patterns:
          - "nu-*"

    open-pull-requests-limit: 3

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    rebase-strategy: "auto"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "chore"
